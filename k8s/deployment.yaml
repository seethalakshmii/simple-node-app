apiVersion: apps/v1
kind: Deployment

metadata:
  name: simple-node-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: simple-node-app

  template:
    metadata:
      labels:
        app: simple-node-app

    spec:
      containers:
      - name: simple-node-app

        image: seetha88/simple-node-app:latest

        ports:
        - containerPort: 3000

        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true

        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"